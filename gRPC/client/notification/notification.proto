syntax = "proto3";

package notification;

service NotificationService {
    rpc Check (HealthCheckRequest) returns (HealthCheckResponse);
    rpc Watch (HealthCheckRequest) returns (stream HealthCheckResponse);
    rpc SendVerifyMail (SendVerifyMailRequest) returns (SendVerifyMailResponse);
    rpc SendPasswordResetMail (SendPasswordResetMailRequest) returns (SendPasswordResetMailResponse);
    rpc SendPasswordResetSuccessMail (SendPasswordResetSuccessMailRequest) returns (SendPasswordResetSuccessMailResponse);
    rpc SendProjectInvite (SendProjectInviteRequest) returns (SendProjectInviteResponse);
    rpc SendRemoveMemberMail (SendRemoveMemberMailRequest) returns (SendRemoveMemberMailResponse);
    rpc SendChangeRoleMail (SendChangeRoleMailRequest) returns (SendChangeRoleMailResponse);
    rpc SendNotification (SendNotificationRequest) returns (SendNotificationResponse);
}

////////// HealthCheck
message HealthCheckRequest {
    string service = 1; // tên service, có thể "" để check toàn bộ server
}

message HealthCheckResponse {
    enum ServingStatus {
        UNKNOWN = 0;
        SERVING = 1;
        NOT_SERVING = 2;
        SERVICE_UNKNOWN = 3; // reserved for future use
    }
    ServingStatus status = 1;
}

////////// SendVerifyMail
message SendVerifyMailRequest {
    string to = 1;
    string token = 2;
}

message SendVerifyMailResponse {
    bool success = 1;
    string message = 2;
}

////////// SendPasswordResetMail
message SendPasswordResetMailRequest {
    string to = 1;
    string token = 2;
}

message SendPasswordResetMailResponse {
    bool success = 1;
    string message = 2;
}

////////// SendPasswordResetSuccessMail
message SendPasswordResetSuccessMailRequest {
    string to = 1;
}

message SendPasswordResetSuccessMailResponse {
    bool success = 1;
    string message = 2;
}

////////// SendProjectInvite
message SendProjectInviteRequest {
    string inviter = 1;
    string to = 2;
    string projectName = 3;
    string application = 4;
}

message SendProjectInviteResponse {
    bool success = 1;
    string message = 2;
}

////////// SendRemoveMemberMail
message SendRemoveMemberMailRequest {
    string from = 1;
    string to = 2;
    string projectName = 3;
    string application = 4;
}

message SendRemoveMemberMailResponse {
    bool success = 1;
    string message = 2;
}

////////// SendChangeRoleMail
message SendChangeRoleMailRequest {
    string from = 1;
    string to = 2;
    string projectName = 3;
    string application = 4;
    string role = 5;
}

message SendChangeRoleMailResponse {
    bool success = 1;
    string message = 2;
}

////////// SendNotification
message SendNotificationRequest {
    repeated string userIds = 1;
    string title = 2;
    string message = 3;
    string priority = 4;
}

message SendNotificationResponse {
    bool success = 1;
    string message = 2;
}